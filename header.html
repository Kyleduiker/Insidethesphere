<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Banner - Inside the Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
        }

        /* Simple Banner */
        .simple-banner {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://i.imgur.com/FTUM2IF.png') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .banner-container {
            max-width: 1400px;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo */
        .banner-logo {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .banner-logo:hover {
            color: #00d4ff;
        }

        /* Navigation */
        .banner-nav {
            display: flex;
            list-style: none;
            gap: 50px;
            margin: 0;
            padding: 0;
        }

        .banner-nav-item {
            position: relative;
        }

        .banner-nav-link {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 0;
            transition: all 0.3s ease;
            position: relative;
        }

        .banner-nav-link:hover {
            color: #00d4ff;
        }

        .banner-nav-link.active {
            color: #00d4ff;
        }

        .banner-nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00d4ff;
            transition: width 0.3s ease;
        }

        .banner-nav-link:hover::after,
        .banner-nav-link.active::after {
            width: 100%;
        }

        /* Dropdown for Tools */
        .dropdown {
            position: relative;
        }

        .dropdown-arrow {
            margin-left: 8px;
            font-size: 12px;
            transition: transform 0.3s ease;
            color: #ccc;
        }

        .dropdown:hover .dropdown-arrow {
            transform: rotate(180deg);
            color: #00d4ff;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 15px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 15px 0;
            min-width: 220px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(-10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .dropdown::before {
            content: '';
            position: absolute;
            top: 100%;
            left: -15px;
            right: -15px;
            height: 20px;
            background: transparent;
            z-index: 1001;
        }

        .dropdown-item {
            display: block;
            color: #ccc;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 14px;
            transition: all 0.3s ease;
            border-radius: 8px;
            margin: 0 10px;
            letter-spacing: 1px;
        }

        .dropdown-item:hover {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .banner-container {
                padding: 0 20px;
                flex-direction: column;
                gap: 30px;
                text-align: center;
            }

            .banner-logo {
                font-size: 20px;
                letter-spacing: 4px;
            }

            .banner-nav {
                flex-direction: column;
                gap: 25px;
            }

            .banner-nav-link {
                font-size: 14px;
                letter-spacing: 1px;
            }

            .dropdown-menu {
                position: static;
                transform: none;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;
                margin: 15px 0;
                box-shadow: none;
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }
        }

        /* Subtle animation */
        .banner-container {
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Simple Clean Banner -->
    <section class="simple-banner">
        <div class="banner-container">
            <!-- Logo -->
            <a href="https://insidethesphere.com/" class="banner-logo">
                INSIDE THE SPHERE
            </a>

            <!-- Navigation -->
            <nav>
                <ul class="banner-nav">
                    <li class="banner-nav-item">
                        <a href="https://insidethesphere.com/" class="banner-nav-link">HOME</a>
                    </li>
                    <li class="banner-nav-item dropdown">
                        <a href="https://insidethesphere.com/tools" class="banner-nav-link">
                            TOOLS
                            <span class="dropdown-arrow">▼</span>
                        </a>
                        <div class="dropdown-menu">
                            <a href="https://insidethesphere.com/newsletter/" class="dropdown-item">Newsletter Builder</a>
                            <a href="https://insidethesphere.com/tools" class="dropdown-item">All Tools</a>
                        </div>
                    </li>
                    <li class="banner-nav-item">
                        <a href="https://insidethesphere.com/videos" class="banner-nav-link">VIDEOS</a>
                    </li>
                    <li class="banner-nav-item">
                        <a href="https://insidethesphere.com/about" class="banner-nav-link">ABOUT</a>
                    </li>
                    <li class="banner-nav-item">
                        <a href="https://insidethesphere.com/contact" class="banner-nav-link">CONTACT</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>

    <script>
        // Set active navigation link based on current page
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.banner-nav-link');

        navLinks.forEach(link => {
            const linkPath = new URL(link.href).pathname;
            
            // Remove active class from all links
            link.classList.remove('active');
            
            // Add active class to current page
            if (currentPath === linkPath || 
                (currentPath === '/' && linkPath === '/') ||
                (currentPath.includes('/tools') && linkPath.includes('/tools')) ||
                (currentPath.includes('/videos') && linkPath.includes('/videos')) ||
                (currentPath.includes('/about') && linkPath.includes('/about')) ||
                (currentPath.includes('/contact') && linkPath.includes('/contact'))) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
