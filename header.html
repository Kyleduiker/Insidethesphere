<style>
/* Header Styles */
.main-header {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 15px 50px;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
}

.header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
}

/* Logo */
.header-logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1.5px;
    color: #fff;
    text-decoration: none;
    transition: color 0.3s ease;
}

.header-logo:hover {
    color: #00d4ff;
}

/* Navigation */
.header-nav {
    display: flex;
    list-style: none;
    gap: 35px;
    margin: 0;
    padding: 0;
}

.nav-item {
    position: relative;
}

.nav-link {
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 10px 0;
    transition: all 0.3s ease;
    position: relative;
}

.nav-link:hover {
    color: #00d4ff;
}

.nav-link.active {
    color: #00d4ff;
}

.nav-link::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: #00d4ff;
    transition: width 0.3s ease;
}

.nav-link:hover::after,
.nav-link.active::after {
    width: 100%;
}

/* Dropdown */
.dropdown {
    position: relative;
}

.dropdown-arrow {
    margin-left: 6px;
    font-size: 12px;
    transition: transform 0.3s ease;
    color: #ccc;
}

.dropdown:hover .dropdown-arrow {
    transform: rotate(180deg);
    color: #00d4ff;
}

.dropdown-menu {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.98);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 12px;
    padding: 10px 0;
    min-width: 200px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    opacity: 0;
    visibility: hidden;
    transform: translateX(-50%) translateY(-10px);
    transition: all 0.3s ease;
    pointer-events: none;
}

.dropdown:hover .dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
}

/* Add hover bridge to prevent flickering */
.dropdown::before {
    content: '';
    position: absolute;
    top: 100%;
    left: -10px;
    right: -10px;
    height: 15px;
    background: transparent;
    z-index: 1001;
}

.dropdown-item {
    display: block;
    color: #ccc;
    text-decoration: none;
    padding: 12px 20px;
    font-size: 14px;
    transition: all 0.3s ease;
    border-radius: 8px;
    margin: 0 8px;
}

.dropdown-item:hover {
    background: rgba(0, 212, 255, 0.2);
    color: #00d4ff;
}

/* Header Actions */
.header-actions {
    display: flex;
    align-items: center;
}

/* Mobile Menu Toggle */
.mobile-toggle {
    display: none;
    flex-direction: column;
    cursor: pointer;
    padding: 5px;
}

.mobile-toggle span {
    width: 25px;
    height: 3px;
    background: #fff;
    margin: 3px 0;
    transition: 0.3s;
    border-radius: 2px;
}

.mobile-toggle:hover span {
    background: #00d4ff;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .main-header {
        padding: 15px 20px;
    }
    
    .header-nav {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.98);
        backdrop-filter: blur(15px);
        flex-direction: column;
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        gap: 0;
    }
    
    .header-nav.active {
        display: flex;
    }
    
    .nav-item {
        width: 100%;
        text-align: center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nav-item:last-child {
        border-bottom: none;
    }
    
    .dropdown-menu {
        position: static;
        transform: none;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        margin: 10px 0;
        box-shadow: none;
    }
    
    .header-actions {
        gap: 0;
    }
    
    .mobile-toggle {
        display: flex;
    }
}

/* Scroll effect */
.main-header.scrolled {
    background: rgba(0, 0, 0, 0.98);
    padding: 12px 50px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

@media (max-width: 768px) {
    .main-header.scrolled {
        padding: 12px 20px;
    }
}
</style>

<header class="main-header">
    <div class="header-container">
        <!-- Logo -->
        <a href="https://insidethesphere.com/" class="header-logo">
            INSIDE THE SPHERE
        </a>

        <!-- Navigation -->
        <nav>
            <ul class="header-nav" id="headerNav">
                <li class="nav-item">
                    <a href="https://insidethesphere.com/" class="nav-link">HOME</a>
                </li>
                <li class="nav-item dropdown">
                    <a href="https://insidethesphere.com/tools" class="nav-link">
                        TOOLS
                        <span class="dropdown-arrow">▼</span>
                    </a>
                    <div class="dropdown-menu">
                        <a href="https://insidethesphere.com/newsletter/" class="dropdown-item" target="_blank">Newsletter Builder</a>
                        <a href="https://insidethesphere.com/tools" class="dropdown-item">All Tools</a>
                    </div>
                </li>
                <li class="nav-item">
                    <a href="https://insidethesphere.com/videos" class="nav-link">VIDEOS</a>
                </li>
                <li class="nav-item">
                    <a href="https://insidethesphere.com/about" class="nav-link">ABOUT</a>
                </li>
                <li class="nav-item">
                    <a href="https://insidethesphere.com/contact" class="nav-link">CONTACT</a>
                </li>
            </ul>
        </nav>

        <!-- Header Actions -->
        <div class="header-actions">
            <!-- Mobile Menu Toggle -->
            <div class="mobile-toggle" id="mobileToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
</header>

<script>
// Header scroll effect
window.addEventListener('scroll', () => {
    const header = document.querySelector('.main-header');
    if (window.scrollY > 50) {
        header.classList.add('scrolled');
    } else {
        header.classList.remove('scrolled');
    }
});

// Mobile menu toggle
const mobileToggle = document.getElementById('mobileToggle');
const headerNav = document.getElementById('headerNav');

if (mobileToggle && headerNav) {
    mobileToggle.addEventListener('click', () => {
        headerNav.classList.toggle('active');
        mobileToggle.classList.toggle('active');
    });
}

// Set active navigation link based on current page
const currentPath = window.location.pathname;
const navLinks = document.querySelectorAll('.nav-link');

navLinks.forEach(link => {
    const linkPath = new URL(link.href).pathname;
    
    // Remove active class from all links
    link.classList.remove('active');
    
    // Add active class to current page
    if (currentPath === linkPath || 
        (currentPath === '/' && linkPath === '/') ||
        (currentPath.includes('/tools') && linkPath.includes('/tools')) ||
        (currentPath.includes('/videos') && linkPath.includes('/videos')) ||
        (currentPath.includes('/about') && linkPath.includes('/about')) ||
        (currentPath.includes('/contact') && linkPath.includes('/contact'))) {
        link.classList.add('active');
    }
});

// Close mobile menu when clicking outside
document.addEventListener('click', (e) => {
    if (!e.target.closest('.main-header')) {
        headerNav.classList.remove('active');
        mobileToggle.classList.remove('active');
    }
});

// Close mobile menu when clicking on a link
navLinks.forEach(link => {
    link.addEventListener('click', () => {
        headerNav.classList.remove('active');
        mobileToggle.classList.remove('active');
    });
});
</script>
