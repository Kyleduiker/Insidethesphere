<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Template - Inside the Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Page Header */
        .page-header {
            padding: 80px 50px 80px;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            text-align: center;
            position: relative;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        .page-header-content {
            position: relative;
            z-index: 10;
        }

        .page-header h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease;
        }

        .page-header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 1s ease 0.2s both;
        }

        /* Main Content Section */
        .content-section {
            padding: 100px 50px;
            background: #111;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #0084c7);
        }

        .content-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: #00d4ff;
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .card-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00d4ff, #0084c7);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-right: 20px;
            color: #000;
        }

        .card-info h3 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-live {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .status-coming-soon {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid #f1c40f;
        }

        .card-description {
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .card-features {
            list-style: none;
            margin-bottom: 30px;
        }

        .card-features li {
            color: #aaa;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .card-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #00d4ff;
            font-weight: bold;
        }

        .card-button {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #00d4ff, #0084c7);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .card-button:hover {
            background: linear-gradient(135deg, #fff, #f0f0f0);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .card-button.disabled {
            background: rgba(255, 255, 255, 0.1);
            color: #666;
            cursor: not-allowed;
        }

        .card-button.disabled:hover {
            transform: none;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .page-header {
                padding: 60px 20px 60px;
            }

            .page-header h1 {
                font-size: 2.5rem;
            }

            .content-section {
                padding: 60px 20px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .content-card {
                padding: 30px;
            }

            .card-icon {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .card-info h3 {
                font-size: 1.5rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.8s ease;
        }


    </style>
</head>
<body>
    <div id="header"></div>
    <script>
      fetch('/header.html')
        .then(res => res.text())
        .then(data => {
          document.getElementById('header').innerHTML = data;
        });
    </script>

    <section class="page-header">
        <div class="page-header-content">
            <h1>PAGE TITLE</h1>
            <p>Your page description goes here - update this text for each new page you create</p>
        </div>
    </section>

    <section class="content-section">
        <div class="content-grid">

    <script>
        // Animate content cards on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animation = 'fadeInUp 0.8s ease forwards';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.content-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
